<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TNF Stats — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>TNF Stats Dashboard</h1>
        <div style="font-size:13px;color:var(--text-muted)">Auto‑clean + UI merge enabled</div>
      </div>
      <div>
        <button id="themeToggle">Toggle theme</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2>Leaderboard</h2>
        <input id="searchInput" placeholder="Search player name" />
      </div>

      <div id="players-grid" aria-live="polite"></div>
    </section>

    <section>
      <h2>Top scorers</h2>
      <div id="top-list"></div>
    </section>

    <section>
      <h2>Payments</h2>
      <div id="payments-log" class="meta">Payments feature coming soon.</div>
    </section>
  </main>

  <footer>
    <small>© TNF Stats</small>
  </footer>

  <script>
    // Utilities
    function titleCase(s){
      return String(s||'').trim().replace(/\s+/g,' ').split(' ').map(w=>w? w[0].toUpperCase()+w.slice(1).toLowerCase() : '').join(' ');
    }

    // Runtime auto-fix loader (merges duplicates, normalizes names, auto-adds players)
    async function loadDataFiles() {
      async function tryFetch(url){
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch (e) {
          console.warn('fetch failed', url, e);
          return null;
        }
      }

      const [playersJson, weeksJson] = await Promise.all([
        tryFetch('data/players.json'),
        tryFetch('data/weeks.json')
      ]);

      const weeksData = weeksJson || {};

      // Merge duplicates per week and normalize names
      const mergedWeeks = {};
      for (const [wk, obj] of Object.entries(weeksData)) {
        const merged = {};
        (obj.players || []).forEach(r => {
          const name = titleCase(String(r.name || ''));
          if (!name) return;
          if (!merged[name]) merged[name] = { name, goals: 0, assists: 0 };
          merged[name].goals += Number(r.goals || 0);
          merged[name].assists += Number(r.assists || 0);
        });
        mergedWeeks[wk] = { ...obj, players: Object.values(merged) };
      }

      // Build roster from players.json and add missing players found in weeks
      const roster = new Map();
      (playersJson || []).forEach(p => {
        const n = titleCase(p.name || '');
        if (!n) return;
        roster.set(n, { name: n, goals: 0, assists: 0 });
      });

      for (const wk of Object.values(mergedWeeks)) {
        (wk.players || []).forEach(p => {
          const n = titleCase(p.name || '');
          if (!n) return;
          if (!roster.has(n)) roster.set(n, { name: n, goals: 0, assists: 0 });
        });
      }

      // Recalculate totals from merged weeks (authoritative totals)
      const totals = {};
      for (const wk of Object.values(mergedWeeks)) {
        (wk.players || []).forEach(p => {
          const n = titleCase(p.name || '');
          if (!n) return;
          if (!totals[n]) totals[n] = { goals: 0, assists: 0 };
          totals[n].goals += Number(p.goals || 0);
          totals[n].assists += Number(p.assists || 0);
        });
      }

      // Apply totals to roster
      for (const [name, rec] of roster.entries()) {
        const t = totals[name] || { goals: 0, assists: 0 };
        rec.goals = t.goals;
        rec.assists = t.assists;
      }

      players = Array.from(roster.values());
      renderPlayersGrid();
      renderTopList();
      attachSearch();
    }

    // Rendering
    function renderPlayersGrid() {
      const grid = document.getElementById('players-grid');
      const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      const html = players
        .filter(p => !q || p.name.toLowerCase().includes(q))
        .sort((a, b) => (b.goals + b.assists) - (a.goals + a.assists))
        .map(p => `
          <div class="player-card">
            <strong class="playerName">${p.name}</strong>
            <div class="meta">Goals: ${p.goals} • Assists: ${p.assists} • Total: ${p.goals + p.assists}</div>
          </div>
        `).join('');
      grid.innerHTML = html || '<div class="meta">No players found</div>';
    }

    function renderTopList() {
      const top = document.getElementById('top-list');
      const topPlayers = players.slice().sort((a,b)=> (b.goals+b.assists)-(a.goals+a.assists)).slice(0,8);
      top.innerHTML = topPlayers.map((p,i)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><strong>${i+1}. ${p.name}</strong><div class="meta">G ${p.goals} • A ${p.assists}</div></div>
          <div style="font-weight:700;color:var(--accent)">${p.goals + p.assists}</div>
        </div>
      `).join('') || '<div class="meta">No top scorers</div>';
    }

    function attachSearch() {
      const s = document.getElementById('searchInput');
      if (!s) return;
      s.addEventListener('input', () => renderPlayersGrid());
    }

    // Theme toggle (keeps existing style.css dark mode)
    document.addEventListener('click', (e) => {
      if (e.target && e.target.id === 'themeToggle') {
        document.body.classList.toggle('dark');
      }
    });

    // Init
    let players = [];
    loadDataFiles();
  </script>
</body>
</html>
