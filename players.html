<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TNF Stats — Players</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>Players</h1>
      </div>
      <div>
        <button id="themeToggle">Toggle theme</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <input id="searchInput" placeholder="Filter players by name" />
    </section>

    <section>
      <div id="players-grid"></div>
    </section>
  </main>

  <footer>
    <small>© TNF Stats</small>
  </footer>

  <script>
    function titleCase(s){ return String(s||'').trim().replace(/\s+/g,' ').split(' ').map(w=>w? w[0].toUpperCase()+w.slice(1).toLowerCase() : '').join(' '); }

    async function loadDataFiles(){
      async function tryFetch(url){ try{ const r = await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status); return await r.json(); }catch(e){console.warn('fetch',url,e);return null;} }
      const [playersJson, weeksJson] = await Promise.all([ tryFetch('data/players.json'), tryFetch('data/weeks.json') ]);
      const weeksData = weeksJson || {};

      const mergedWeeks = {};
      for(const [wk,obj] of Object.entries(weeksData)){
        const merged = {};
        (obj.players||[]).forEach(r=>{
          const name = titleCase(r.name||'');
          if(!name) return;
          if(!merged[name]) merged[name] = { name, goals:0, assists:0 };
          merged[name].goals += Number(r.goals||0);
          merged[name].assists += Number(r.assists||0);
        });
        mergedWeeks[wk] = { ...obj, players: Object.values(merged) };
      }

      const roster = new Map();
      (playersJson||[]).forEach(p=>{
        const n = titleCase(p.name||'');
        if(!n) return;
        roster.set(n, { name:n, goals:0, assists:0 });
      });

      for(const wk of Object.values(mergedWeeks)){
        (wk.players||[]).forEach(p=>{
          const n = titleCase(p.name||'');
          if(!n) return;
          if(!roster.has(n)) roster.set(n, { name:n, goals:0, assists:0 });
          const rec = roster.get(n);
          rec.goals += Number(p.goals||0);
          rec.assists += Number(p.assists||0);
        });
      }

      players = Array.from(roster.values());
      render();
      attachFilter();
    }

    function render(){
      const grid = document.getElementById('players-grid');
      const q = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
      grid.innerHTML = players
        .filter(p => !q || p.name.toLowerCase().includes(q))
        .sort((a,b)=> (b.goals+b.assists)-(a.goals+a.assists))
        .map(p=>`
          <div class="player-card">
            <strong class="playerName">${p.name}</strong>
            <div class="meta">Goals: ${p.goals} • Assists: ${p.assists} • Total: ${p.goals + p.assists}</div>
          </div>
        `).join('') || '<div class="meta">No players</div>';
    }

    function attachFilter(){
      const f = document.getElementById('searchInput');
      if(!f) return;
      f.addEventListener('input', ()=> render());
    }

    // Theme toggle
    document.addEventListener('click', (e) => {
      if (e.target && e.target.id === 'themeToggle') document.body.classList.toggle('dark');
    });

    let players = [];
    loadDataFiles();
  </script>
</body>
</html>
