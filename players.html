<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TNF Stats — Players</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:#071026;color:#eaf2ff;padding:28px}
    .panel{max-width:1100px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    h1{margin:0;font-size:20px}
    #players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .player-card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    .player-card strong{display:block;font-size:15px;margin-bottom:6px}
    .meta{color:#9aa4b2;font-size:13px}
    #filter{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:inherit;margin-bottom:12px;width:100%}
    footer{margin-top:20px;color:#9aa4b2;text-align:center}
    @media(max-width:700px){#players-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
  </style>
</head>
<body>
  <div class="panel">
    <header>
      <h1>Players</h1>
      <input id="filter" placeholder="Filter players by name" />
    </header>

    <div id="players-grid" aria-live="polite"></div>

    <footer>© TNF Stats</footer>
  </div>

  <script>
    function titleCase(s){ return String(s||'').trim().replace(/\s+/g,' ').split(' ').map(w=>w? w[0].toUpperCase()+w.slice(1).toLowerCase() : '').join(' '); }

    async function loadDataFiles(){
      async function tryFetch(url){ try{ const r = await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status); return await r.json(); }catch(e){console.warn('fetch',url,e);return null;} }
      const [playersJson, weeksJson] = await Promise.all([ tryFetch('data/players.json'), tryFetch('data/weeks.json') ]);
      const weeksData = weeksJson || {};
      const mergedWeeks = {};
      for(const [wk,obj] of Object.entries(weeksData)){
        const merged = {};
        (obj.players||[]).forEach(r=>{
          const name = titleCase(r.name||'');
          if(!name) return;
          if(!merged[name]) merged[name] = { name, goals:0, assists:0 };
          merged[name].goals += Number(r.goals||0);
          merged[name].assists += Number(r.assists||0);
        });
        mergedWeeks[wk] = { ...obj, players: Object.values(merged) };
      }

      const roster = new Map();
      (playersJson||[]).forEach(p=>{
        const n = titleCase(p.name||'');
        if(!n) return;
        roster.set(n, { name:n, goals:0, assists:0 });
      });

      for(const wk of Object.values(mergedWeeks)){
        (wk.players||[]).forEach(p=>{
          const n = titleCase(p.name||'');
          if(!n) return;
          if(!roster.has(n)) roster.set(n, { name:n, goals:0, assists:0 });
          const rec = roster.get(n);
          rec.goals += Number(p.goals||0);
          rec.assists += Number(p.assists||0);
        });
      }

      players = Array.from(roster.values());
      render();
      attachFilter();
    }

    function render(){
      const grid = document.getElementById('players-grid');
      const q = (document.getElementById('filter')?.value||'').trim().toLowerCase();
      grid.innerHTML = players
        .filter(p => !q || p.name.toLowerCase().includes(q))
        .sort((a,b)=> (b.goals+b.assists)-(a.goals+a.assists))
        .map(p=>`
          <div class="player-card">
            <strong>${p.name}</strong>
            <div class="meta">Goals: ${p.goals} • Assists: ${p.assists} • Total: ${p.goals + p.assists}</div>
          </div>
        `).join('') || '<div style="color:#9aa4b2">No players</div>';
    }

    function attachFilter(){
      const f = document.getElementById('filter');
      if(!f) return;
      f.addEventListener('input', ()=> render());
    }

    let players = [];
    loadDataFiles();
  </script>
</body>
</html>
