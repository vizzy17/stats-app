<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TNF Stats – Players</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Players</h1>
  </header>

  <main>
    <div id="players-grid"></div>
  </main>

  <footer>
    <small>© TNF Stats</small>
  </footer>

  <script>
    window.__FALLBACK_PLAYERS = [];
    window.__FALLBACK_WEEKS = {};

    async function loadDataFiles() {
      const fallbackPlayers = window.__FALLBACK_PLAYERS || [];
      const fallbackWeeks = window.__FALLBACK_WEEKS || {};

      async function tryFetch(url) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch (err) {
          console.warn('Could not fetch', url, err);
          return null;
        }
      }

      const [playersJson, weeksJson] = await Promise.all([
        tryFetch('data/players.json'),
        tryFetch('data/weeks.json')
      ]);

      const weeksData = weeksJson || fallbackWeeks;

      const mergedWeeks = {};
      for (const [wk, obj] of Object.entries(weeksData)) {
        const merged = {};
        (obj.players || []).forEach(r => {
          const name = r.name.trim().toUpperCase();
          if (!merged[name]) merged[name] = { name, goals: 0, assists: 0 };
          merged[name].goals += Number(r.goals || 0);
          merged[name].assists += Number(r.assists || 0);
        });
        mergedWeeks[wk] = { ...obj, players: Object.values(merged) };
      }

      const roster = new Map();
      (playersJson || fallbackPlayers).forEach(p => {
        roster.set(p.name.trim().toUpperCase(), {
          name: p.name.trim().toUpperCase(),
          goals: Number(p.goals || 0),
          assists: Number(p.assists || 0)
        });
      });

      for (const week of Object.values(mergedWeeks)) {
        week.players.forEach(p => {
          if (!roster.has(p.name)) {
            roster.set(p.name, { name: p.name, goals: 0, assists: 0 });
          }
        });
      }

      players = Array.from(roster.values());
      renderPlayersGrid();
    }

    function renderPlayersGrid() {
      const grid = document.getElementById('players-grid');
      grid.innerHTML = players
        .sort((a, b) => (b.goals + b.assists) - (a.goals + a.assists))
        .map(p => `
          <div class="player-card">
            <strong>${p.name}</strong><br>
            Goals: ${p.goals}<br>
            Assists: ${p.assists}
          </div>
        `)
        .join('');
    }

    let players = [];
    loadDataFiles();
  </script>
</body>
</html>
