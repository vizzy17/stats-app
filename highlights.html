<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TNF Stats — Highlights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>Highlights</h1>
        <div style="font-size:13px;color:var(--text-muted)">Auto‑merged weeks view</div>
      </div>
      <div>
        <button id="themeToggle">Toggle theme</button>
      </div>
    </div>
  </header>

  <main>
    <section id="highlights-list"></section>
  </main>

  <footer>
    <small>© TNF Stats</small>
  </footer>

  <script>
    function titleCase(s){ return String(s||'').trim().replace(/\s+/g,' ').split(' ').map(w=>w? w[0].toUpperCase()+w.slice(1).toLowerCase() : '').join(' '); }

    async function loadData(){
      try{
        const res = await fetch('data/weeks.json',{cache:'no-store'});
        if(!res.ok) throw new Error('HTTP '+res.status);
        const weeks = await res.json();
        const mergedWeeks = {};
        for(const [wk,obj] of Object.entries(weeks)){
          const merged = {};
          (obj.players||[]).forEach(r=>{
            const name = titleCase(r.name||'');
            if(!name) return;
            if(!merged[name]) merged[name] = { name, goals:0, assists:0 };
            merged[name].goals += Number(r.goals||0);
            merged[name].assists += Number(r.assists||0);
          });
          mergedWeeks[wk] = { ...obj, players: Object.values(merged) };
        }
        render(mergedWeeks);
      }catch(e){
        console.warn('Could not load weeks', e);
        document.getElementById('highlights-list').innerHTML = '<div class="meta">No highlights available</div>';
      }
    }

    function render(weeks){
      const container = document.getElementById('highlights-list');
      const html = Object.entries(weeks).sort((a,b)=> a[0].localeCompare(b[0])).reverse().map(([wk,data])=>{
        const date = data.date ? `<div class="meta">${data.date}</div>` : '';
        const players = (data.players||[]).slice().sort((a,b)=> (b.goals+b.assists)-(a.goals+a.assists)).slice(0,6).map(p=>`${p.name} (${p.goals}G ${p.assists}A)`).join(', ');
        return `
          <div class="week-block">
            <div class="week-header"><span>${wk}</span><span>${data.title || ''}</span></div>
            <div class="week-body">
              ${date}
              <div style="margin-top:8px">
                ${data.videoUrl ? `<a href="${data.videoUrl}" target="_blank">Highlights</a>` : ''}
                ${data.fullVideoUrl ? ` <a href="${data.fullVideoUrl}" target="_blank">Full Match</a>` : ''}
              </div>
              ${players ? `<div style="margin-top:8px" class="meta">Top: ${players}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
      container.innerHTML = html || '<div class="meta">No highlights yet</div>';
    }

    // Theme toggle
    document.addEventListener('click', (e) => {
      if (e.target && e.target.id === 'themeToggle') document.body.classList.toggle('dark');
    });

    loadData();
  </script>
</body>
</html>
