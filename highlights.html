<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TNF Stats – Highlights</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Highlights</h1>
  </header>

  <main>
    <div id="highlights-list"></div>
  </main>

  <footer>
    <small>© TNF Stats</small>
  </footer>

  <script>
    window.__FALLBACK_WEEKS = {};

    async function loadDataFiles() {
      async function tryFetch(url) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch (err) {
          console.warn('Could not fetch', url, err);
          return null;
        }
      }

      const weeksJson = await tryFetch('data/weeks.json');
      const weeksData = weeksJson || window.__FALLBACK_WEEKS;

      const mergedWeeks = {};
      for (const [wk, obj] of Object.entries(weeksData)) {
        const merged = {};
        (obj.players || []).forEach(r => {
          const name = r.name.trim().toUpperCase();
          if (!merged[name]) merged[name] = { name, goals: 0, assists: 0 };
          merged[name].goals += Number(r.goals || 0);
          merged[name].assists += Number(r.assists || 0);
        });
        mergedWeeks[wk] = { ...obj, players: Object.values(merged) };
      }

      weeks = mergedWeeks;
      renderHighlights();
    }

    function renderHighlights() {
      const container = document.getElementById('highlights-list');
      container.innerHTML = Object.entries(weeks)
        .map(([wk, data]) => `
          <div class="week-card">
            <h3>${wk} — ${data.date}</h3>
            ${data.videoUrl ? `<a href="${data.videoUrl}" target="_blank">Watch Highlights</a><br>` : ""}
            ${data.fullVideoUrl ? `<a href="${data.fullVideoUrl}" target="_blank">Full Match</a>` : ""}
          </div>
        `)
        .join('');
    }

    let weeks = {};
    loadDataFiles();
  </script>
</body>
</html>
